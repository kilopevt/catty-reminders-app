name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: hesa
          key: ${{ secrets.SSH_LAB2 }}
          port: 3113
          request_pty: true
          script: |
            set -e

            # Остановить и удалить старый контейнер (если есть)
            docker stop catty-app || true
            docker rm catty-app || true

            # Авторизация в GitHub Container Registry (используем PAT)
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u kilopevt --password-stdin

            # Скачать последний образ
            docker pull ghcr.io/kilopevt/catty-reminders-app:latest

            # Запустить новый контейнер
            docker run -d --name catty-app \
              --restart unless-stopped \
              -p 8181:8181 \
              -e DEPLOY_REF="${{ github.sha }}" \
              ghcr.io/kilopevt/catty-reminders-app:latest

            # Проверка, что контейнер запустился
            sleep 3
            if docker ps | grep -q catty-app; then
              echo "SUCCESS: Container deployed"
            else
              echo "ERROR: Container failed to start"
              exit 1
            fi
